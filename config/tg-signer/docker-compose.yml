services:
  tg-signer:
    image: ghcr.io/amchii/tg-signer:latest-webui
    container_name: tg-signer-webui

    ports:
      - "7860:8080"

    environment:
      TZ: Asia/Shanghai
      TG_PROXY: socks5://clash:Mq893904155@192.168.1.8:7891

    volumes:
      - ./data:/opt/tg-signer
      - ./start.sh:/start.sh

    command: /start.sh

    restart: unless-stopped
